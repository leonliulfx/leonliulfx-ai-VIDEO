    <style>
        :root {
            --bg: #0b0b14;
            --card-bg: #16162a;
            --primary: #6366f1;
            --accent: #06b6d4;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #e2e8f0;
            --text-secondary: #a0aec0;
            --border: #2a2a42;
            --radius: 14px;
            --radius-sm: 10px;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 1500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .header {
            text-align: center;
            padding: 10px 0;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #e2e8f0, #818cf8, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
        }
        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .input-row input {
            flex: 1;
            min-width: 280px;
            padding: 12px 16px;
            background: #1e1e36;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            color: #fff;
            font-family: monospace;
            outline: none;
            font-size: 0.95rem;
        }
        .input-row input:focus {
            border-color: var(--primary);
        }
        .btn {
            padding: 12px 20px;
            font-weight: 600;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.95rem;
            white-space: nowrap;
            transition: all 0.2s;
            background: var(--primary);
            color: #fff;
        }
        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: var(--primary);
        }
        .btn-accent {
            background: var(--accent);
            color: #000;
            font-weight: 700;
        }
        .btn-accent:hover {
            background: #05c2de;
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.85rem;
            border-radius: 8px;
        }
        .btn-xs {
            padding: 5px 10px;
            font-size: 0.75rem;
            border-radius: 6px;
        }
        .btn-danger {
            background: var(--danger);
        }
        .btn-success {
            background: var(--success);
        }

        .main-player-section {
            margin-top: 8px;
        }
        .main-player {
            background: #000;
            border-radius: var(--radius-sm);
            aspect-ratio: 16/9;
            max-height: 500px;
            overflow: hidden;
            position: relative;
        }
        .main-player iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .grid-section {
            margin-top: 8px;
        }
        .grid-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        .api-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 8px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .api-grid::-webkit-scrollbar {
            width: 6px;
        }
        .api-grid::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }
        .api-cell {
            background: #0f0f20;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            min-height: 120px;
            display: flex;
            flex-direction: column;
        }
        .api-cell.active {
            border-color: var(--success);
            box-shadow: 0 0 16px rgba(16, 185, 129, 0.6);
            order: -10;
        }
        .api-cell.available {
            border-color: #1e6b4c;
            order: -5;
        }
        .api-cell:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            z-index: 2;
        }

            font-size: 0.7rem;
            padding: 4px 8px;
            background: #1a1a30;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            flex-shrink: 0;
        }

            background: #000;
            position: relative;
            aspect-ratio: 16/9;
        }

            height: 100%;
            border: none;
            pointer-events: none;
        }

            width: 8px;
            height: 8px;
            border-radius: 50%;

            flex-shrink: 0;
        }

            background: var(--warning);
            animation: pulse 1s infinite;
        }
        .status-dot.success {
            background: var(--success);
        }
        .status-dot.error {
            background: var(--danger);
        }
        @keyframes pulse {
            0%,
            100% {

            }
            50% {

            }
        }

            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .toast {

            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: #e2e8f0;
            padding: 12px 24px;
            border-radius: 24px;
            font-weight: 600;
            z-index: 999;

            border: 1px solid var(--border);
            opacity: 0;

        }

        }

</head>

            // ==================== 自定义腾讯视频解析器 ====================
            async function parseTencentVideo(url) {
                try {
                    // 提取vid
                    let vid = null;
                    const vidMatch = url.match(/\/([a-zA-Z0-9]{11,13})\.html/);
                    if (vidMatch) {
                        vid = vidMatch[1];
                    } else {
                        // 尝试从页面内容提取
                        const response = await fetch(url);
                        const html = await response.text();
                        const vidRegex = /vid\s*:\s*["']([a-zA-Z0-9]+)["']/;
                        const match = html.match(vidRegex);
                        if (match) vid = match[1];
                    }
                    if (!vid) {
                        // 尝试匹配其他格式
                        const altMatch = url.match(/\/page\/([a-zA-Z0-9]+)\.html/);
                        if (altMatch) vid = altMatch[1];
                    }
                    if (!vid) return null;
                    
                    // 调用腾讯视频官方接口获取播放信息
                    const apiUrl = `https://vv.video.qq.com/getinfo?vids=${vid}&platform=101001&charge=0&otype=json`;
                    const response = await fetch(apiUrl);
                    const text = await response.text();
                    // 清理QZOutputJson包裹
                    const jsonStr = text.replace(/^QZOutputJson=/, '').replace(/;$/, '');
                    const data = JSON.parse(jsonStr);
                    
                    if (data.vl && data.vl.vi && data.vl.vi.length > 0) {
                        const vi = data.vl.vi[0];
                        const fn = vi.fn;
                        const fvkey = vi.fvkey;
                        const ui = vi.ul.ui;
                        if (ui && ui.length > 0) {
                            const baseUrl = ui[0].url;
                            const realUrl = baseUrl + fn + '?vkey=' + fvkey;
                            return realUrl;
                        }
                    }
                    // 备用：使用iframe播放器
                    return `https://v.qq.com/iframe/player.html?vid=${vid}&tiny=1&auto=1`;
                } catch (e) {
                    console.error('腾讯视频解析失败:', e);
                    return null;
                }

                    cell.setAttribute('data-status', 'idle');
                    cell.innerHTML = `
                        <div class="label">
                            <span>${api.name}</span>
                            <span class="status-dot" id="dot-${index}" title="等待加载"></span>
                        </div>
                        <div class="preview-frame" id="frame-${index}"></div>
                    `;
                    cell.addEventListener('click', () => switchMainPlayer(index));
                    apiGrid.appendChild(cell);
                });
                applyFilter();
            }

            function loadCell(index) {
                const frameContainer = document.getElementById('frame-' + index);
                const dot = document.getElementById('dot-' + index);
                const cell = document.querySelector(`[data-index="${index}"]`);
                if (!frameContainer) return;
                const fullUrl = getFullApiUrl(index);
                if (!fullUrl) return;
                frameContainer.innerHTML = '';
                dot.className = 'status-dot loading';
                if (cell) {
                    cell.setAttribute('data-status', 'loading');
                    cell.classList.remove('available');
                }
                const iframe = document.createElement('iframe');
                iframe.allow = 'autoplay; encrypted-media; fullscreen; picture-in-picture';
                iframe.allowFullscreen = true;
                iframe.src = fullUrl;
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                iframe.style.pointerEvents = 'none';
                iframe.loading = 'lazy';
                let resolved = false;
                const markResolved = (type) => {
                    if (resolved) return;
                    resolved = true;
                    if (type === 'success') {
                        dot.className = 'status-dot success';
                        if (cell) {
                            cell.setAttribute('data-status', 'success');
                            cell.classList.add('available');
                        }
                    } else {
                        dot.className = 'status-dot error';
                        if (cell) cell.setAttribute('data-status', 'error');
                    }
                    updateStats();
                };
                iframe.onload = () => markResolved('success');
                iframe.onerror = () => markResolved('error');
                const timeoutId = setTimeout(() => markResolved('error'), 12000);
                cellTimers.set(index, timeoutId);
                frameContainer.appendChild(iframe);
                updateStats();
            }

            function stopCell(index) {
                const frameContainer = document.getElementById('frame-' + index);
                const dot = document.getElementById('dot-' + index);
                const cell = document.querySelector(`[data-index="${index}"]`);
                if (frameContainer) frameContainer.innerHTML = '';
                if (dot) dot.className = 'status-dot';
                if (cell) cell.setAttribute('data-status', 'idle');
                if (cellTimers.has(index)) {
                    clearTimeout(cellTimers.get(index));
                    cellTimers.delete(index);
                }
            }

            function stopAllCells(exceptIndex = -1) {
                apiList.forEach((_, i) => { if (i !== exceptIndex) stopCell(i); });
                updateStats();
                if (exceptIndex === -1) gridStatus.textContent = '已全部停止';
                else gridStatus.textContent = `已暂停其他窗口，仅保留「${apiList[exceptIndex].name}」`;
            }

            function loadAllCells() {
                globalAbort = false;
                gridStatus.textContent = '正在并发加载...';
                stopAllCells(-1);
                apiList.forEach((_, i) => {
                    setTimeout(() => { if (!globalAbort) loadCell(i); }, i * 30);
                });
                const checkInterval = setInterval(() => {
                    if (globalAbort) { clearInterval(checkInterval); return; }
                    let s = 0,
                        l = 0,
                        e = 0;
                    apiList.forEach((_, i) => {
                        const d = document.getElementById('dot-' + i);
                        if (!d) return;
                        if (d.classList.contains('success')) s++;
                        else if (d.classList.contains('loading')) l++;
                        else if (d.classList.contains('error')) e++;
                    });
                    successCountEl.textContent = s;
                    loadingCountEl.textContent = l;
                    errorCountEl.textContent = e;
                    if (l === 0) {
                        gridStatus.textContent = `解析完成 | ${s} 个接口可用`;
                        clearInterval(checkInterval);
                    }
                }, 1500);
            }

            function updateStats() {
                let s = 0,
                    l = 0,
                    e = 0;
                apiList.forEach((_, i) => {
                    const d = document.getElementById('dot-' + i);
                    if (!d) return;
                    if (d.classList.contains('success')) s++;
                    else if (d.classList.contains('loading')) l++;
                    else if (d.classList.contains('error')) e++;
                });
                successCountEl.textContent = s;
                loadingCountEl.textContent = l;
                errorCountEl.textContent = e;
            }

            function applyFilter() {
                const cells = document.querySelectorAll('.api-cell');
                cells.forEach(cell => {
                    const status = cell.getAttribute('data-status');
                    if (currentFilter === 'all' || status === currentFilter) {
                        cell.style.display = '';
                    } else {
                        cell.style.display = 'none';
                    }
                });
            }

            function loadMainPlayer(url, name) {
                mainPlayer.innerHTML = '';
                const iframe = document.createElement('iframe');
                iframe.allow = 'autoplay; encrypted-media; fullscreen; picture-in-picture';
                iframe.allowFullscreen = true;
                iframe.src = url;
                iframe.style.width = '100%';
                iframe.style.height = '100%';
                iframe.style.border = 'none';
                mainPlayer.appendChild(iframe);
                currentMainVideoUrl = url;
                currentPlayingLabel.textContent = `当前: ${name}`;
            }

            function switchMainPlayer(index) {
                const fullUrl = getFullApiUrl(index);
                if (!fullUrl) { showToast('请先输入视频链接'); return; }
                currentMainApiIndex = index;
                loadMainPlayer(fullUrl, apiList[index].name);
                document.querySelectorAll('.api-cell').forEach(c => c.classList.remove('active'));
                const activeCell = document.querySelector(`[data-index="${index}"]`);
                if (activeCell) activeCell.classList.add('active');
                stopAllCells(index);
                showToast(`✅ 已切换到「${apiList[index].name}」`);
            }

            function autoSelectBest() {
                let bestIndex = -1;
                for (let i = 0; i < apiList.length; i++) {
                    const dot = document.getElementById('dot-' + i);
                    if (dot && dot.classList.contains('success')) { bestIndex = i; break; }
                }
                if (bestIndex >= 0) {
                    switchMainPlayer(bestIndex);
                    showToast('🤖 已自动选择最佳可用接口');
                } else {
                    showToast('⚠️ 暂无可用接口，请等待加载完成');
                }
            }

            // ==================== 按钮事件 ====================
            btnStartAll.addEventListener('click', () => {
                const videoUrl = urlInput.value.trim();
                if (!videoUrl || (!videoUrl.startsWith('http://') && !videoUrl.startsWith('https://'))) {
                    showToast('请输入完整视频链接');
                    return;
                }
                globalAbort = false;
                mainPlayer.innerHTML =
                    '<div style="display:flex; align-items:center; justify-content:center; height:100%; color:#666;">👆 点击下方绿色小窗选择接口播放</div>';
                currentMainApiIndex = -1;
                currentMainVideoUrl = '';
                currentPlayingLabel.textContent = '点击下方绿色小窗选择接口播放';
                document.querySelectorAll('.api-cell').forEach(c => c.classList.remove('active'));
                loadAllCells();
                showToast('🚀 正在并发加载所有解析接口...');
            });

            btnStopAll.addEventListener('click', () => {
                globalAbort = true;
                stopAllCells(-1);
                showToast('⏹️ 已暂停所有窗口');
            });

            btnAutoSelect.addEventListener('click', autoSelectBest);

            btnTencentDirect.addEventListener('click', async () => {
                const videoUrl = urlInput.value.trim();
                if (!videoUrl) { showToast('请输入腾讯视频链接'); return; }
                showToast('🎯 正在使用内置解析器解析腾讯视频...');
                try {
                    const result = await parseTencentVideo(videoUrl);
                    if (result) {
                        loadMainPlayer(result, '腾讯直链解析');
                        showToast('✅ 腾讯视频直链解析成功！');
                    } else {
                        showToast('❌ 腾讯视频直链解析失败，请尝试其他接口');
                    }
                } catch (e) {
                    showToast('❌ 解析出错: ' + e.message);
                }
            });

            btnMainNewWindow.addEventListener('click', () => {
                const url = currentMainVideoUrl || (urlInput.value.trim() ? getFullApiUrl(0) : null);
                if (url) {
                    window.open(url, '_blank', 'noopener,noreferrer');
                    showToast('已在新窗口打开');
                } else {
                    showToast('请先输入视频链接');
                }
            });

            btnAddCustomApi.addEventListener('click', () => {
                const name = customApiName.value.trim() || '自定义';
                const url = customApiUrl.value.trim();
                if (!url) { showToast('请输入接口地址'); return; }
                if (!url.includes('?url=') && !url.includes('{url}')) {
                    showToast('接口地址需包含 ?url= 参数');
                    return;
                }
                apiList.push({ name, url: url.includes('{url}') ? url : url });
                buildGrid();
                showToast(`➕ 已添加自定义接口「${name}」`);
                customApiName.value = '';
                customApiUrl.value = '';
            });

            urlInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault();
                    btnStartAll.click(); }
            });

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList
                        .remove('active'));
                    this.classList.add('active');
                    currentFilter = this.getAttribute('data-filter');
                    applyFilter();
                });
            });

            buildGrid();
            console.log('📺 百接口并发预览播放器已就绪');
            console.log('💡 使用提示: 粘贴链接 -> 点击"并发解析全部" -> 等待绿色窗口出现 -> 点击绿色窗口切换主播放');
            console.log('🎯 腾讯视频用户可点击"腾讯直链解析"按钮使用内置解析器');
        })();
    </script>
</body>
</html>
